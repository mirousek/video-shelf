services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      VS_REDIS_URL: redis://redis:6379/0
      VS_DEBUG: "true"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      VS_REDIS_URL: redis://redis:6379/0
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
