services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      VS_REDIS_URL: redis://redis:6379/0
      VS_USE_S3: "false"
      VS_S3_ENDPOINT: http://minio:9000
      VS_DEBUG: "true"
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - minio

  worker:
    build: .
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    environment:
      VS_REDIS_URL: redis://redis:6379/0
      VS_USE_S3: "false"
      VS_S3_ENDPOINT: http://minio:9000
    volumes:
      - ./data:/app/data
    depends_on:
      - redis
      - minio

volumes:
  redis_data:
  minio_data:
